<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>pihouser.com – DND MAP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <!-- Components -->
  <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/webxr-polyfill@latest/build/webxr-polyfill.min.js"></script>

  <!-- YOUR JS (ORDER MATTERS) -->
  <script src="/assets/js/semantic-graph.js"></script>
  <script src="/assets/js/semantic-trigger.js"></script>
  <script src="/assets/js/poi-label.js"></script>

  <!-- Firefox / focus fix -->
  <script>
  window.addEventListener('DOMContentLoaded', () => {
    const scene = document.querySelector('a-scene');
    if (!scene) return;

    scene.addEventListener('click', () => scene.focus());

    scene.addEventListener('loaded', () => {
      const canvas = scene.canvas;
      if (!canvas) return;

      canvas.setAttribute('tabindex', '0');
      canvas.addEventListener('click', () => canvas.focus());
    });

    window.addEventListener('keydown', (e) => {
      if (['w','a','s','d'].includes(e.key.toLowerCase())) {
        e.preventDefault();
      }
    });
  });
  </script>

  <!-- Coordinate Reader -->
  <script>
  AFRAME.registerComponent('coords-reader', {
    init: function () {
      this.cursor = document.querySelector('a-cursor');
      this.display = document.getElementById('coords');
    },
    tick: function () {
      if (!this.cursor) return;

      const rc = this.cursor.components.raycaster;
      if (!rc) return;

      const hits = rc.intersections;
      if (!hits || hits.length === 0) return;

      const hit = hits[0];

      if (!hit.object.el.classList.contains('raycastable')) return;

      const p = hit.point;

      this.display.innerText =
        `X: ${p.x.toFixed(2)} | ` +
        `Y: ${p.y.toFixed(2)} | ` +
        `Z: ${p.z.toFixed(2)}`;
    }
  });
  </script>

  <style>
    body { margin: 0; }
    .hud {
      position: absolute;
      left: 10px;
      top: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 10px 12px;
      font: 14px/1.35 sans-serif;
      border-radius: 8px;
      max-width: 320px;
    }
    .hud b { color: #ffd54a; }
  </style>
</head>

<body>

<div class="hud">
  <div id="semantic-output" style="margin-bottom:10px;">
    <b>Semantic Data</b><br>
    Click a POI
  </div>

  <div><b>Controls</b></div>
  <div>W/A/S/D = move</div>
  <div>Mouse = look</div>
  <div>X = E/W, Y = Elevation, Z = N/S</div>

  <div id="coords">
    X: 0 | Y: 0 | Z: 0
  </div>
</div>

<a-scene semantic-graph renderer="colorManagement: true" background="color: #20252b">

  <!-- Assets -->
  <a-assets>
    <img id="skyTexture" src="https://cdn.aframe.io/a-painter/images/sky.jpg">
    <a-asset-item id="map-textured" src="assets/obj/SwordCoast_Textured.glb"></a-asset-item>
  </a-assets>

  <!-- Environment -->
  <a-entity environment="preset: default"></a-entity>
  <a-light type="ambient" intensity="2.2"></a-light>
  <a-light type="directional" intensity="1.0" position="3 8 4"></a-light>

  <!-- Camera -->
  <a-entity id="rig" position="3.5 3.6 8" coords-reader>
    <a-camera
      wasd-controls="enabled: true"
      look-controls="pointerLockEnabled: true"
      tabindex="0">
      <a-cursor
       fuse="false"
       raycaster="objects: .raycastable, .clickable; far: 100">
     </a-cursor>
    </a-camera>
  </a-entity>

  <a-sky src="#skyTexture"></a-sky>

  <!-- Debug Grid -->
  <a-plane position="0 0 -6" rotation="-90 0 0"
           width="20" height="20"
           material="wireframe: true; opacity: 0.25"
           color="#555">
  </a-plane>

  <!-- Origin -->
  <a-sphere position="0 0.05 -6" radius="0.08" color="#ffffff"></a-sphere>

  <!-- Axes -->
  <a-box position="1 0.05 -6" width="2" height="0.03" depth="0.03" color="#ff3333"></a-box>
  <a-box position="0 1 -6" width="0.03" height="2" depth="0.03" color="#33ff66"></a-box>
  <a-box position="0 0.05 -7" width="0.03" height="0.03" depth="2" color="#3399ff"></a-box>

  <!-- Map -->
  <a-entity id="map-root" position="0 0 0" scale="0.14 0.14 0.14">
    <a-entity
      gltf-model="#map-textured"
      class="raycastable"
      shadow>
    </a-entity>
  </a-entity>

  <!-- POI -->
  <a-sphere
    id="poi-baldurs-gate"
    class="clickable raycastable"
    position="-0.894 0.4 4.35"
    radius="0.1"
    color="#FF0000"
    poi-label="name: Baldur's Gate"
    semantic-trigger
    event-set__enter="event: mouseenter; color: #FB24FF"
    event-set__leave="event: mouseleave; color: #BD24FF"
    data-uri="http://www.semanticweb.org/pear/ontologies/2026/0/11-gis#BaldursGate">
  </a-sphere>

</a-scene>

</body>
</html>
